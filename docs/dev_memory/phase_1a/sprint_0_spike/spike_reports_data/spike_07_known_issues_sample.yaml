  id: s0_04_stl_vector_allocator_value_type_mismatch
  description: std::vector allocator value_type does not match the vector element
    type
  category: template_error
  match:
    error_regex: std::vector must have the same value_type as its allocator
    captures: []
  supported_error_types:
  - template_error
  unsupported_error_types:
  - type_mismatch
  - undefined_reference
  - runtime_crash
  evidence_requirements:
    must_have:
    - template_instantiation_context
    - source_symbol_context
    optional:
    - type_dependencies
  likely_causes:
  - The STL container allocator template argument is not an allocator for the value
    type
  - A template parameter was edited without updating the allocator argument
  suggested_fix_hints:
  - Check the container template arguments at the instantiation site
  - Use std::allocator<T> or omit the allocator parameter unless a real allocator
    is intended
  suggested_fix_type:
  - source_modification
  anti_patterns:
  - Some template errors are only downstream symptoms of an earlier primary error
  - libc++ and libstdc++ may report equivalent template failures with different wording
  - A custom allocator may be valid if its value_type matches exactly
  confidence_default: 0.7
  validation_source: S0-04 exp1.4 template_error real pkgmgr-info log
